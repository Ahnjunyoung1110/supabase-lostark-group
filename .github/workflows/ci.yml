name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: lint · typecheck · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript 타입 검사
        run: npx tsc --noEmit

      - name: 단위 테스트
        run: npm run test
